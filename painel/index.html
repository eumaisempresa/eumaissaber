<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Executivo - EU⁺ Saber</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* ... (Mantenha o seu CSS original de variáveis e estilos base aqui) ... */
        :root { --fundo-principal: #060E18; --fundo-secundario: #0A1624; --fundo-terciario: #0E1E30; --dourado-principal: #C4974A; --texto-principal: #EEF0F2; --texto-secundario: #7A8FA3; --bordas: rgba(196, 151, 74, 0.18); }
        body { background-color: var(--fundo-principal); color: var(--texto-principal); font-family: 'DM Sans', sans-serif; }
        
        /* Estilo dos Novos Botões Flutuantes */
        .fab-container { position: fixed; bottom: 30px; right: 30px; z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
        .fab { width: 50px; height: 50px; border-radius: 50%; background: var(--dourado-principal); color: var(--fundo-principal); display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: none; font-size: 20px; transition: transform 0.2s; }
        .fab:hover { transform: scale(1.1); }
        .hidden { display: none; }

        .modal-form { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--fundo-secundario); padding: 20px; border: 1px solid var(--dourado-principal); z-index: 1001; width: 90%; max-width: 400px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="fab-container">
        <button class="fab" onclick="toggleFabs()"><i class="fa-solid fa-plus"></i></button>
        <button class="fab hidden" onclick="abrirFormWa()"><i class="fa-brands fa-whatsapp"></i></button>
        <button class="fab hidden" onclick="window.open('https://linkedin.com/company/eumaisempresa', '_blank')"><i class="fa-brands fa-linkedin-in"></i></button>
        <button class="fab hidden" onclick="window.open('https://instagram.com/eumaisempresa', '_blank')"><i class="fa-brands fa-instagram"></i></button>
    </div>

    <div id="modalWa" class="modal-form">
        <h3 style="color:var(--dourado-principal)">Fale Conosco</h3>
        <select id="tipoMsg" style="width:100%; padding:10px; margin:10px 0;">
            <option>Dúvida</option><option>Sugestão</option><option>Elogio</option><option>Reclamação</option>
        </select>
        <textarea id="msgTexto" style="width:100%; height:80px;"></textarea>
        <button onclick="enviarWa()" style="width:100%; margin-top:10px;">Enviar via WhatsApp</button>
    </div>

    <script>
        // Lógica de menus flutuantes
        function toggleFabs() { document.querySelectorAll('.fab.hidden').forEach(el => el.classList.toggle('hidden')); }
        function abrirFormWa() { document.getElementById('modalWa').style.display = 'block'; }
        function enviarWa() {
            const tipo = document.getElementById('tipoMsg').value;
            const msg = document.getElementById('msgTexto').value;
            window.open(`https://wa.me/55SEUNUMERO?text=[${tipo}] ${msg}`, '_blank');
        }

        // Função corrigida de tratamento de texto
        function tratarSintaxeConteudo(textoBruto) {
            if (!textoBruto) return "";
            let html = textoBruto.replace(/\n/g, '<br>');
            const linhas = html.split('<br>');
            
            return linhas.map(linha => {
                let clean = linha.trim();
                
                // Correção do Bullet Point (*.) com negrito se terminar em :
                if (/^\s*\*\.\s*/.test(clean)) {
                    let conteudo = clean.replace(/^\s*\*\.\s*/, '');
                    if (conteudo.endsWith(':')) { conteudo = `<strong>${conteudo}</strong>`; }
                    return `<div class="custom-bullet">${conteudo}</div>`;
                }
                
                // Correção da Seta (-.)
                if (/^\s*\-\.\s*/.test(clean)) {
                    let conteudo = clean.replace(/^\s*\-\.\s*/, '');
                    if (conteudo.endsWith(':')) { conteudo = `<strong>${conteudo}</strong>`; }
                    return `<div class="custom-arrow">${conteudo}</div>`;
                }
                return linha;
            }).join('<br>');
        }
        // ... (resto do seu código original)
    </script>
</body>
</html>
